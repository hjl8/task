<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let score = [], sum = 0, max = 0, min = 0, avg = 0, s;
        do {
            s = prompt('请输入学生成绩：');
            s = Number(s);
            if (isNaN(s)||s>100||s<0) {
                alert('请正确输入成绩！');
                continue;
            }
            score[score.length] = s;
        } while (s != 0);
        max = score[0], min = score[0];
        for (let i = 0; i < score.length; i++) {
            sum += score[i];
            if (max<score[i]) {
                max=score[i];
            }
            if (min>score[i]&&score[i]!=0) {
                min=score[i];
            }
        }
        avg=sum/score.length-1;
        alert(`成绩的平均分：${avg}；最高分：${max};最低分：${min}`)
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = prompt('请输入一个整数：'), arr = [1,1], res='';
        num = Number(num);
        for (let i = arr.length; i < num; i++) {
            if (isNaN(num) || num % 1 != 0 || num < 0) {
                alert('请输入一个正整数！');
                break;
            }
            arr[i]=arr[i-1]+arr[i-2];
        }
        for (let i = 0; i < arr.length; i++) {
            res+=arr[i]+' ';
        }
        if (arr.length>=3) {
            alert(res);
        }
    </script>
</body>
</html>

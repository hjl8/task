<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let str = prompt('输入一个字符串：'),newStr = '';
        for (let i = str.length-1; i >=0; i++) {
            newStr+=str[i];
        }
        alert('反转之后的结果：' + newStr);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let num = prompt('请输入一个整数：'), res = '';
        num = Number(num);
        for (let i = 1; i <= num; i++) {
            if (isNaN(num) || num % 1 != 0 || num < 0) {
                alert('请输入一个正整数！');
                break;
            }
            let flag = true;
            for (let j = 2; j < i; j++) {
                if (i % j == 0) {
                    flag = !flag;
                    break;
                }
            }
            if (flag) {
                res += i + ' ';
            }
        }

        if (res != '') {
            alert(res);
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = prompt('请输入一个整数：'), arr = [], sum=0;
        num = Number(num);
        for (let i = 1; i < num; i++) {
            if (isNaN(num)&&parseInt(num)>0) {
                alert('请输入一个正整数！');
                break;
            }
            if(num%i==0){
                arr.push(i);
            }
        }

        arr.forEach(e => {
            sum+=e;
        });
        if (sum==num) {
            alert(num+'是完数');
        }else{
            alert(num+'不是完数');
        }
    </script>
</body>
</html>

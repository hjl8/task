<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let random = parseInt(Math.random() * 100 + 1), user = 0;
        do {
            user = prompt('请输入你猜的数字：');
            user = Number(user);
            if (isNaN(user)) {
                alert('请输入1-100之间的正整数！');
                continue;
            } else if (user < random) {
                alert('猜小了！')
            } else if (user > random) {
                alert('猜大了！')
            }
        } while (user != random);
        alert('恭喜你猜对了！')
    </script>
</body>

</html>
